name: CD(Continuous Deployment)

on:
  workflow_run:
    workflows: ["CI(Continuous Integration)"] # Adjust the workflow name if needed
    types: [completed]

permissions:
  actions: read # 允许下载其他 workflow 的产物
  contents: read
  
jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist 
          run-id: ${{ github.event.workflow_run.id }} # 下载对应 workflow run 的产物
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: ./dist # 下载到当前目录下的 dist 文件夹

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh

          # 把 GitHub Secret 中的私钥写进文件
          echo "${{ secrets.DEPLOY_SERVER_SSH_KEY }}" > ~/.ssh/id_ed25519

          # 设置严格的权限 (SSH 协议强制要求)
          chmod 600 ~/.ssh/id_ed25519

          # 忽略主机指纹检查 
          echo "StrictHostKeyChecking no" >> ~/.ssh/config
        
      - name: Deploy with rsync
        run: |
          rsync -avz --delete -e "ssh -i ~/.ssh/id_ed25519" ./dist/ github-action@cannian.space:/var/www/cannian/